<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Study Princess Planner</title>

<style>

body{
background:linear-gradient(to bottom,#fff7fb,#ffeef7);
font-family:'Segoe UI', sans-serif;
text-align:center;
color:#ff80b3;
margin:0;
}

.container{
margin-top:40px;
}

.card{
background:#ffffffcc;
padding:20px;
margin:20px auto;
width:320px;
border-radius:25px;
box-shadow:0 10px 25px rgba(255,182,217,0.2);
border:1px solid #ffe0f0;
}

button{
background:linear-gradient(to right,#ffd6eb,#ffe4f2);
border:none;
padding:8px 12px;
border-radius:20px;
cursor:pointer;
color:#ff66a3;
margin:3px;
}

input, textarea{
padding:8px;
border-radius:15px;
border:1px solid #ffd6eb;
width:80%;
margin:5px;
}

h1{
font-weight:300;
letter-spacing:2px;
}

.melody{
position:fixed;
bottom:10px;
right:10px;
width:80px;
opacity:0.8;
}

</style>
</head>

<body>

<audio id="music" autoplay loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<audio id="meow">
<source src="meow.mp3" type="audio/mpeg">
</audio>

<div class="container">

<img src="https://i.imgur.com/dYcYQ7E.png" width="120">

<h1>Study Princess</h1>

<div class="card">
<h3>Planner do Dia</h3>
<textarea id="planner" placeholder="O que você precisa fazer hoje?"></textarea>
<button onclick="savePlanner()">Salvar</button>
</div>

<div class="card">
<h3>Tarefas</h3>
<input id="taskInput" placeholder="Nova tarefa">
<button onclick="addTask()">Adicionar</button>
<ul id="taskList"></ul>
</div>

<div class="card">
<h3>Metas</h3>
<textarea id="goals" placeholder="Suas metas..."></textarea>
<button onclick="saveGoals()">Salvar</button>
</div>

<div class="card">
<h3>Mood</h3>
<input id="mood" placeholder="Como você está se sentindo?">
<button onclick="saveMood()">Salvar</button>
</div>

<div class="card">
<h3>Pomodoro</h3>
<p id="timer">25:00</p>
<button onclick="startTimer()">Start</button>
<button onclick="resetTimer()">Reset</button>
</div>

</div>

<img class="melody" src="https://i.imgur.com/8QZ7Z4A.png">

<script>

document.addEventListener("keydown", ()=>{
document.getElementById("meow").play();
})

function savePlanner(){
localStorage.setItem("planner", planner.value);
}

planner.value = localStorage.getItem("planner") || "";

function addTask(){
let task = taskInput.value;
let li = document.createElement("li");
li.textContent = task;
taskList.appendChild(li);
taskInput.value="";
}

function saveGoals(){
localStorage.setItem("goals", goals.value);
}
goals.value = localStorage.getItem("goals") || "";

function saveMood(){
localStorage.setItem("mood", mood.value);
}
mood.value = localStorage.getItem("mood") || "";

let time=1500;
let timerInterval;

function startTimer(){
timerInterval=setInterval(()=>{
time--;
let min=Math.floor(time/60);
let sec=time%60;
timer.textContent=min+":"+(sec<10?"0":"")+sec;
},1000);
}

function resetTimer(){
clearInterval(timerInterval);
time=1500;
timer.textContent="25:00";
}

</script>

</body>
</html>
